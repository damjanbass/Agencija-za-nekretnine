name: Mesečni izveštaj

on:
  schedule:
    # Prvi ponedeljak u mesecu u 8:00 po Beogradu (UTC+2 = 06:00 UTC)
    # Pokreće se 1-7. u mesecu, ali samo ako je ponedeljak
    - cron: "0 6 1-7 * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-monthly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Python setup
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Instaliraj zavisnosti
        run: pip install -r requirements.txt

      - name: Pokreni mesečni izveštaj
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
        run: python -X utf8 main.py --monthly
